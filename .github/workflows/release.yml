name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish (for example: v0.0.0)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    outputs:
      release_tag: ${{ steps.resolve_tag.outputs.release_tag }}
    permissions:
      contents: read
    steps:
      - name: Resolve tag
        id: resolve_tag
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          release_tag="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            release_tag="${INPUT_TAG}"
          fi
          if ! [[ "${release_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: ${release_tag}"
            exit 1
          fi
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout release tag
        env:
          RELEASE_TAG: ${{ steps.resolve_tag.outputs.release_tag }}
        run: |
          set -euo pipefail
          git fetch --force origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          git checkout --detach "${RELEASE_TAG}"

      - name: Ensure crate metadata matches tag
        env:
          RELEASE_TAG: ${{ steps.resolve_tag.outputs.release_tag }}
        run: |
          set -euo pipefail
          release_version="${RELEASE_TAG#v}"
          cargo_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)"

          if [ "${cargo_version}" != "${release_version}" ]; then
            echo "Cargo.toml version (${cargo_version}) does not match release tag (${release_version})."
            exit 1
          fi

          if ! grep -q "^## \[${release_version}\]" CHANGELOG.md; then
            echo "CHANGELOG.md is missing a ## [${release_version}] entry."
            exit 1
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install supply-chain tools
        uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2
        with:
          tool: cargo-deny,cargo-audit

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --locked --all-features

      - name: Dependency policy
        run: cargo deny check

      - name: Security audit
        run: cargo audit

  build:
    name: Build (${{ matrix.asset }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    needs: validate
    permissions:
      attestations: write
      contents: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            asset: linux-x86_64
            ext: ""
          - os: macos-14
            target: aarch64-apple-darwin
            asset: macos-arm64
            ext: ""
          - os: macos-15-intel
            target: x86_64-apple-darwin
            asset: macos-x86_64
            ext: ""
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            asset: windows-x86_64
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.validate.outputs.release_tag }}
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Extract release notes
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.validate.outputs.release_tag }}
        run: |
          set -euo pipefail
          release_version="${RELEASE_TAG#v}"
          awk -v version="${release_version}" '
            index($0, "## [" version "]") == 1 { in_release=1; next }
            /^## \[/ && in_release { exit }
            in_release { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Failed to extract release notes for ${release_version} from CHANGELOG.md."
            exit 1
          fi

      - name: Build release binary
        shell: bash
        env:
          TARGET_TRIPLE: ${{ matrix.target }}
        run: cargo build --locked --release --all-features --target "${TARGET_TRIPLE}"

      - name: Package
        shell: bash
        env:
          TARGET_TRIPLE: ${{ matrix.target }}
          ASSET_NAME: ${{ matrix.asset }}
          BIN_EXT: ${{ matrix.ext }}
        run: |
          set -euo pipefail
          bin="target/${TARGET_TRIPLE}/release/weather-signal${BIN_EXT}"
          package_dir="dist/weather-signal-${ASSET_NAME}"
          mkdir -p "${package_dir}"
          cp "${bin}" "${package_dir}/"
          cp README.md LICENSE CHANGELOG.md "${package_dir}/"

          tar -C dist -czf "weather-signal-${ASSET_NAME}.tar.gz" "weather-signal-${ASSET_NAME}"
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "weather-signal-${ASSET_NAME}.tar.gz" > "weather-signal-${ASSET_NAME}.sha256"
          else
            sha256sum "weather-signal-${ASSET_NAME}.tar.gz" > "weather-signal-${ASSET_NAME}.sha256"
          fi

      - name: Smoke packaged artifact
        shell: bash
        env:
          ASSET_NAME: ${{ matrix.asset }}
          BIN_EXT: ${{ matrix.ext }}
        run: |
          set -euo pipefail
          smoke_dir="$(mktemp -d)"
          tar -xzf "weather-signal-${ASSET_NAME}.tar.gz" -C "${smoke_dir}"
          bin="${smoke_dir}/weather-signal-${ASSET_NAME}/weather-signal${BIN_EXT}"
          test -x "${bin}"
          "${bin}" --version
          XDG_CACHE_HOME="${smoke_dir}/cache" XDG_CONFIG_HOME="${smoke_dir}/config" "${bin}" cache status

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: spdx-json
          output-file: weather-signal-${{ matrix.asset }}.sbom.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Publish build provenance
        if: ${{ !github.event.repository.private }}
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            weather-signal-${{ matrix.asset }}.tar.gz
            weather-signal-${{ matrix.asset }}.sha256
            weather-signal-${{ matrix.asset }}.sbom.spdx.json

      - name: Publish release assets
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ needs.validate.outputs.release_tag }}
          name: ${{ needs.validate.outputs.release_tag }}
          body_path: RELEASE_NOTES.md
          files: |
            weather-signal-${{ matrix.asset }}.tar.gz
            weather-signal-${{ matrix.asset }}.sha256
            weather-signal-${{ matrix.asset }}.sbom.spdx.json
