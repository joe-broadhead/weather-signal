name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main
      - "release/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    env:
      CARGO_BUILD_JOBS: "1"
      RUSTFLAGS: "-C debuginfo=0"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

  test:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    env:
      CARGO_BUILD_JOBS: "1"
      CARGO_INCREMENTAL: "0"
      RUSTFLAGS: "-C debuginfo=0"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Test
        run: cargo test --locked --all-features

  msrv:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    env:
      CARGO_BUILD_JOBS: "1"
      RUSTFLAGS: "-C debuginfo=0"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.93.0

      - name: Rust Cache
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Check MSRV
        run: cargo check --locked --all-features

  docs:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r docs/requirements.txt

      - name: Build Docs
        run: mkdocs build --strict

  deny:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install cargo-deny
        uses: taiki-e/install-action@cf525cb33f51aca27cd6fa02034117ab963ff9f1 # v2
        with:
          tool: cargo-deny@0.19.0

      - name: Supply-chain checks
        run: cargo deny check

  audit:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@cf525cb33f51aca27cd6fa02034117ab963ff9f1 # v2
        with:
          tool: cargo-audit

      - name: RustSec audit
        run: cargo audit
