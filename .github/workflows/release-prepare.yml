name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (for example: 0.0.0)"
        required: true
        type: string
      base_branch:
        description: "Base branch for the release PR"
        required: true
        default: "master"
        type: choice
        options:
          - master
          - main

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate release metadata
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if ! [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must be in semantic x.y.z format (for example: 0.0.0)."
            exit 1
          fi

          cargo_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)"
          if [ "${cargo_version}" != "${VERSION}" ]; then
            echo "Cargo.toml version (${cargo_version}) does not match requested release version (${VERSION})."
            exit 1
          fi

          if ! grep -q "^## \[${VERSION}\]" CHANGELOG.md; then
            echo "CHANGELOG.md is missing a ## [${VERSION}] entry."
            exit 1
          fi

      - name: Create release branch
        env:
          VERSION: ${{ inputs.version }}
          BASE_BRANCH: ${{ inputs.base_branch }}
        run: |
          set -euo pipefail
          git fetch origin "${BASE_BRANCH}"
          git checkout "${BASE_BRANCH}"
          git pull origin "${BASE_BRANCH}"

          branch="release/${VERSION}"
          if git show-ref --verify --quiet "refs/remotes/origin/${branch}"; then
            echo "Release branch already exists: ${branch}"
            exit 0
          fi

          git checkout -b "${branch}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "release: v${VERSION}"
          git push origin "${branch}"

      - name: Open release PR
        env:
          VERSION: ${{ inputs.version }}
          BASE_BRANCH: ${{ inputs.base_branch }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          repo="${GITHUB_REPOSITORY}"
          api="https://api.github.com/repos/${repo}/pulls"
          branch="release/${VERSION}"

          existing="$(curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${api}?state=open&base=${BASE_BRANCH}&head=${repo%/*}:${branch}" \
            | jq 'length')"

          if [ "${existing}" -gt 0 ]; then
            echo "Release PR already exists."
            exit 0
          fi

          curl -fsSL -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${api}" \
            -d @- <<JSON
          {
            "title": "release: v${VERSION}",
            "head": "${branch}",
            "base": "${BASE_BRANCH}",
            "body": "Release branch for v${VERSION}. Merge into ${BASE_BRANCH} to tag and publish."
          }
          JSON
